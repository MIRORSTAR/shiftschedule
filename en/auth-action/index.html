<!DOCTYPE html><html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shift Schedule — подтверждение</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --accent: #4a8fe8;
      --accent2: #66b8b2;
      --text: #e8eaf0;
      --text2: #8b90a0;
      --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 40px 32px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .icon { font-size: 56px; margin-bottom: 20px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 12px; }
    p { color: var(--text2); font-size: 15px; line-height: 1.6; margin-bottom: 8px; }
    .btn {
      display: inline-block;
      margin-top: 24px;
      padding: 14px 32px;
      background: var(--accent);
      color: #fff;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
    }
    .btn:hover { opacity: 0.85; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(74,143,232,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Password reset form */
    .form-group { margin-top: 20px; text-align: left; }
    label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 6px; }
    input[type=password] {
      width: 100%;
      padding: 12px 16px;
      background: #0f1117;
      border: 1px solid #2a2d3d;
      border-radius: 10px;
      color: var(--text);
      font-size: 15px;
      outline: none;
    }
    input[type=password]:focus { border-color: var(--accent); }
    button.submit {
      width: 100%;
      margin-top: 16px;
      padding: 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    button.submit:hover { opacity: 0.85; }
    button.submit:disabled { opacity: 0.5; cursor: default; }
  </style>

<body>
  <div class="card" id="card">
    <div class="spinner"></div>
    <p>Загрузка...</p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const mode = params.get('mode');
    const oobCode = params.get('oobCode');
    const apiKey = params.get('apiKey');
    const card = document.getElementById('card');

    function showResult(icon, title, text, link, linkText) {
      card.innerHTML =
        '<div class="icon">' + icon + '</div>' +
        '<h1>' + title + '</h1>' +
        '<p>' + text + '</p>' +
        (link ? '<a class="btn" href="' + link + '">' + linkText + '</a>' : '');
    }

    async function verifyEmail() {
      try {
        const res = await fetch(
          'https://identitytoolkit.googleapis.com/v1/accounts:update?key=' + apiKey,
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ oobCode: oobCode })
          }
        );
        if (res.ok) {
          showResult('✅', 'Email подтверждён', 'Ваш адрес электронной почты успешно подтверждён. Теперь можно вернуться в приложение.', null, null);
        } else {
          const err = await res.json();
          const code = err.error && err.error.message;
          if (code === 'EXPIRED_OOB_CODE') {
            showResult('⏱', 'Ссылка устарела', 'Ссылка для подтверждения истекла. Откройте приложение и запросите новое письмо в настройках аккаунта.', null, null);
          } else if (code === 'INVALID_OOB_CODE') {
            showResult('❌', 'Неверная ссылка', 'Ссылка недействительна или уже была использована. Запросите новое письмо в приложении.', null, null);
          } else {
            showResult('❌', 'Ошибка', 'Не удалось подтвердить email. Попробуйте позже или напишите нам: ruslanmirorstar@yandex.ru', null, null);
          }
        }
      } catch(e) {
        showResult('❌', 'Ошибка сети', 'Проверьте подключение к интернету и попробуйте снова.', null, null);
      }
    }

    function showResetForm() {
      card.innerHTML =
        '<div class="icon">🔐</div>' +
        '<h1>Новый пароль</h1>' +
        '<p>Введите новый пароль для вашего аккаунта Shift Schedule.</p>' +
        '<div class="form-group">' +
          '<label>Новый пароль (минимум 6 символов)</label>' +
          '<input type="password" id="pw1" placeholder="••••••••">' +
        '</div>' +
        '<div class="form-group">' +
          '<label>Повторите пароль</label>' +
          '<input type="password" id="pw2" placeholder="••••••••">' +
        '</div>' +
        '<button class="submit" id="submitBtn" onclick="doReset()">Сохранить пароль</button>';
    }

    async function doReset() {
      const pw1 = document.getElementById('pw1').value;
      const pw2 = document.getElementById('pw2').value;
      const btn = document.getElementById('submitBtn');
      if (pw1.length < 6) { alert('Пароль должен быть не менее 6 символов.'); return; }
      if (pw1 !== pw2) { alert('Пароли не совпадают.'); return; }
      btn.disabled = true;
      btn.textContent = 'Сохранение...';
      try {
        const res = await fetch(
          'https://identitytoolkit.googleapis.com/v1/accounts:resetPassword?key=' + apiKey,
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ oobCode: oobCode, newPassword: pw1 })
          }
        );
        if (res.ok) {
          showResult('✅', 'Пароль изменён', 'Пароль успешно обновлён. Войдите в приложение с новым паролем.', null, null);
        } else {
          const err = await res.json();
          const code = err.error && err.error.message;
          if (code === 'EXPIRED_OOB_CODE') {
            showResult('⏱', 'Ссылка устарела', 'Ссылка для сброса пароля истекла. Запросите новое письмо в приложении.', null, null);
          } else {
            showResult('❌', 'Ошибка', 'Не удалось изменить пароль. Попробуйте позже.', null, null);
          }
        }
      } catch(e) {
        btn.disabled = false;
        btn.textContent = 'Сохранить пароль';
        alert('Ошибка сети. Проверьте подключение к интернету.');
      }
    }

    if (!oobCode || !apiKey) {
      showResult('❌', 'Неверная ссылка', 'Ссылка недействительна. Откройте приложение и повторите действие.', null, null);
    } else if (mode === 'verifyEmail') {
      verifyEmail();
    } else if (mode === 'resetPassword') {
      showResetForm();
    } else {
      showResult('❌', 'Неизвестное действие', 'Эта ссылка не поддерживается. Откройте приложение.', null, null);
    }
  </script>


</body></html>
